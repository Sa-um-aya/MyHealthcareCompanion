<!DOCTYPE html>
<html>
<head>
<title>Health Information</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="{{ url_for('static', filename='script.js') }}"></script>
</head>

<body>

<div class="container">

<div class="baymax-face">
<div class="eye left"></div>
<div class="eye right"></div>
<div class="line"></div>
</div>

<h2>👩‍⚕️I was alerted to the need of medical attention when you filled the form🤖</h2>

<div class="card">

<label>What issue are you experiencing?</label>

<select id="issue">
<option value="headache">Headache</option>
<option value="stomach">Stomach Pain</option>
<option value="cold">Cold / Fever</option>
<option value="fatigue">Fatigue</option>
</select>

<label>How long have you had this?</label>

<select id="duration">
<option value="hours">Few Hours</option>
<option value="days">Few Days</option>
<option value="weeks">Weeks</option>
</select>

<label>Describe your symptoms</label>

<textarea id="symptoms" placeholder="Describe symptoms"></textarea>

<button onclick="saveHealth()">Continue</button>

</div>

</div>

</body>
</html>
