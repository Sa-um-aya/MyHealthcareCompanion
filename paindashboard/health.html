<!DOCTYPE html>
<html>
<head>
<title>Health Questions</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="baymax-face">
<div class="eye left"></div>
<div class="eye right"></div>
<div class="line"></div>
</div>

<h2>I need more information to assist you.</h2>

<label>What issue are you experiencing?</label>

<select id="issue">
<option value="headache">Headache</option>
<option value="stomach">Stomach Pain</option>
<option value="muscle">Muscle Pain</option>
<option value="fatigue">Fatigue</option>
<option value="fever">Fever</option>
</select>

<label>How long have you had this issue?</label>

<select id="duration">
<option value="hours">Few Hours</option>
<option value="days">1-3 Days</option>
<option value="week">More than a Week</option>
</select>

<label>Additional symptoms</label>

<textarea id="symptoms" placeholder="Example: nausea, dizziness"></textarea>

<button onclick="saveHealth()">Analyze</button>

</div>

<script src="script.js"></script>

</body>
</html>
